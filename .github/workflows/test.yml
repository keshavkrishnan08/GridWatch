name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (TypeScript)
        run: npm run test

      - name: Unit tests (pipeline)
        run: npm run test:py

      - name: Build
        run: npm run build

      - name: Validate the shipped dataset
        run: |
          python3 -m pipeline.validate_input public/data/facilities.json \
            --subdivisions public/data/counties.geojson
